<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log In — International ISA</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background: var(--brand); margin:0; }
    .login-card { background: var(--card); border-radius: 12px; padding: 40px 36px; width: 340px; box-shadow: 0 30px 80px rgba(0,0,0,0.35); }
    .login-card h1 { font-family: var(--serif); font-weight: 500; font-size: 26px; margin: 0 0 4px; }
    .login-card p { color: var(--muted); font-size: 13.5px; margin: 0 0 20px; }
    .login-card label { font-size: 13px; font-weight: 600; display:block; margin: 12px 0 4px; }
    .login-card input { width: 100%; box-sizing: border-box; padding: 11px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; }
    .login-card button { width: 100%; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>International ISA</h1>
    <p>Team dashboard</p>
    {% with messages = get_flashed_messages() %}
      {% if messages %}<div class="flash">{% for m in messages %}{{ m }}{% endfor %}</div>{% endif %}
    {% endwith %}
    <form method="post">
      <label>Username</label>
      <input type="text" name="username" required autofocus>
      <label>Password</label>
      <input type="password" name="password" required>
      <button type="submit" class="btn">Log In</button>
    </form>
  </div>
</body>
</html>
